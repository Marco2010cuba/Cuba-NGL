<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGL Cuba - Envía un mensaje anónimo</title>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
        }

        /* Fondo tipo partículas */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #111 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.2;
        }

        .message-container {
            text-align: center;
            z-index: 1;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .user-info {
            margin-bottom: 30px;
            padding: 20px;
            border: 2px solid #ff2d55;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(255, 0, 80, 0.3);
        }

        .user-info h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff0040, #ff4d6d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-info p {
            color: #888;
            font-size: 14px;
        }

        .message-box {
            border: 2px solid #ff2d55;
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(255, 0, 80, 0.3);
        }

        .message-box h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #ff4d6d;
            font-size: 1.5rem;
        }

        .message-textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #555;
            background: #111;
            color: white;
            outline: none;
            font-size: 16px;
            resize: vertical;
            font-family: inherit;
        }

        .message-textarea:focus {
            border-color: #ff2d55;
        }

        .char-count-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            gap: 10px;
        }

        .random-btn {
            padding: 8px 12px;
            border: 1px solid #ff2d55;
            border-radius: 8px;
            background: rgba(255, 45, 85, 0.1);
            color: #ff4d6d;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .random-btn:hover {
            background: rgba(255, 45, 85, 0.2);
            transform: scale(1.05);
        }

        .char-count {
            text-align: right;
            color: #888;
            font-size: 14px;
        }

        .name-input-container {
            margin: 15px 0;
        }

        .name-input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #555;
            background: #111;
            color: white;
            outline: none;
            font-size: 14px;
            font-family: inherit;
        }

        .name-input:focus {
            border-color: #ff2d55;
        }

        .name-input::placeholder {
            color: #666;
        }

        .send-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, #ff0040, #ff4d6d);
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .anonymous-note {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 45, 85, 0.1);
            border: 1px solid rgba(255, 45, 85, 0.3);
            border-radius: 10px;
            font-size: 14px;
            color: #888;
        }

        .anonymous-note i {
            color: #ff4d6d;
            margin-right: 8px;
        }

        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: rgba(255, 45, 85, 0.2);
            border: 1px solid #ff2d55;
            border-radius: 10px;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
        }

        .back-link:hover {
            background: rgba(255, 45, 85, 0.4);
        }

        /* Notificaciones */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            z-index: 2000;
            display: none;
        }

        .notification.success {
            background: linear-gradient(45deg, #00c851, #00ff00);
        }

        .notification.error {
            background: linear-gradient(45deg, #ff4444, #cc0000);
        }

        /* Responsive */
        @media (max-width: 520px) {
            .message-container {
                padding: 10px;
            }

            .user-info {
                padding: 15px;
            }

            .user-info h1 {
                font-size: 1.5rem;
            }

            .message-box {
                padding: 25px;
            }

            .message-textarea {
                min-height: 120px;
                padding: 12px;
                font-size: 14px;
            }

            .send-btn {
                padding: 12px;
                font-size: 14px;
            }

            .char-count-container {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }

            .random-btn {
                align-self: flex-start;
                font-size: 11px;
                padding: 6px 10px;
            }

            .char-count {
                text-align: left;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> Volver
    </a>

    <div class="message-container">
        <div class="user-info">
            <h1 id="usernameDisplay">@usuario</h1>
            <p>Envíame un mensaje anónimo</p>
        </div>

        <div class="message-box">
            <h2>Escribe tu mensaje</h2>
            
            <textarea 
                id="messageText" 
                class="message-textarea" 
                placeholder="Escribe tu mensaje anónimo aquí..."
                maxlength="300"
                oninput="updateCharCount()"
            ></textarea>
            
            <div class="char-count-container">
                <button id="randomMessageBtn" class="random-btn" onclick="generateRandomMessage()" title="Generar mensaje aleatorio">
                    <i class="fas fa-dice"></i> Random
                </button>
                <div class="char-count">
                    <span id="charCount">0</span>/300 caracteres
                </div>
            </div>

            <div class="name-input-container">
                <input 
                    type="text" 
                    id="senderName" 
                    class="name-input" 
                    placeholder="Tu nombre (opcional)"
                    maxlength="20"
                    oninput="updateCharCount()"
                />
            </div>

            <button id="sendBtn" class="send-btn" onclick="sendMessage()" disabled>
                <i class="fas fa-paper-plane"></i> Enviar Mensaje
            </button>

            <div class="anonymous-note">
                <i class="fas fa-user-secret"></i>
                Debes ingresar tu nombre real para continuar. El uso de datos falsos puede limitar tu acceso a la web o tu cuenta puede ser bloqueada.
            </div>
        </div>
    </div>

    <!-- Notificaciones -->
    <div id="notification" class="notification"></div>

    <script>
        // Configuración de Firebase - Credenciales reales del proyecto nglcuba-716bc
        const firebaseConfig = {
            apiKey: "AIzaSyD6x4eNp1zXMDFP7doLcNEgsBGkEzw2bQw",
            authDomain: "nglcuba-716bc.firebaseapp.com",
            projectId: "nglcuba-716bc",
            storageBucket: "nglcuba-716bc.firebasestorage.app",
            messagingSenderId: "936553267154",
            appId: "1:936553267154:web:2755eed1c9e00d38b5920b",
            measurementId: "G-9HY5E1PM5V"
        };

        // Inicializar Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let targetUserId = null;
        let targetUsername = null;

        // Obtener el usuario de la URL
        function getUserFromURL() {
            // Primero intentar obtener el parámetro ?user=
            const urlParams = new URLSearchParams(window.location.search);
            const userParam = urlParams.get('user');
            
            if (userParam) {
                return userParam.replace('@', '');
            }
            
            // Si no hay parámetro, intentar con la ruta /u/username
            const pathParts = window.location.pathname.split('/');
            const username = pathParts[pathParts.length - 1];
            
            if (username && username !== 'message.html' && username !== 'u') {
                return username.replace('@', '');
            }
            
            return null;
        }

        // Cargar información del usuario
        function loadUserInfo() {
            const username = getUserFromURL();
            
            if (!username) {
                showNotification('Usuario no encontrado', 'error');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
                return;
            }

            // Buscar usuario por username
            db.collection('users').where('username', '==', username).get()
                .then((querySnapshot) => {
                    if (querySnapshot.empty) {
                        showNotification('Usuario no encontrado', 'error');
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 2000);
                        return;
                    }

                    const userDoc = querySnapshot.docs[0];
                    const userData = userDoc.data();
                    
                    targetUserId = userDoc.id;
                    targetUsername = userData.username;
                    
                    document.getElementById('usernameDisplay').textContent = '@' + userData.username;
                    document.title = `NGL Cuba - Envía un mensaje a @${userData.username}`;
                })
                .catch((error) => {
                    console.error('Error cargando usuario:', error);
                    showNotification('Error cargando información', 'error');
                });
        }

        // Actualizar contador de caracteres
        function updateCharCount() {
            const messageText = document.getElementById('messageText');
            const charCount = document.getElementById('charCount');
            const sendBtn = document.getElementById('sendBtn');
            
            const currentLength = messageText.value.length;
            charCount.textContent = currentLength;
            
            // Habilitar/deshabilitar botón
            if (currentLength > 0 && currentLength <= 300) {
                sendBtn.disabled = false;
            } else {
                sendBtn.disabled = true;
            }
        }

        // Generar mensaje aleatorio
        function generateRandomMessage() {
            const randomMessages = [
                "Eres increíble, nunca cambies ✨",
                "Tu sonrisa ilumina el día 🌟",
                "Gracias por existir 🙏",
                "Eres una persona maravillosa 💫",
                "Tu energía es contagiosa ⚡",
                "Admiro mucho tu fortaleza 💪",
                "Eres único/a y especial 🌈",
                "Tu amabilidad no tiene límites ❤️",
                "Gracias por ser tú 🦋",
                "Eres inspiración para muchos 🌺",
                "Tu positivismo es admirable ☀️",
                "Eres más fuerte de lo que crees 🎯",
                "Tu presencia hace la diferencia 🌸",
                "Eres un ejemplo a seguir 🏆",
                "Tu bondad conmueve 🌻",
                "Eres auténtico/a y eso es genial 🎨",
                "Tu valor es incalculable 💎",
                "Eres luz en la oscuridad 🕯️",
                "Tu perseverancia es admirable 🚀",
                "Eres simplemente perfecto/a 🌟"
            ];

            const messageText = document.getElementById('messageText');
            const randomIndex = Math.floor(Math.random() * randomMessages.length);
            const randomMessage = randomMessages[randomIndex];
            
            messageText.value = randomMessage;
            updateCharCount();
            
            // Pequeña animación en el botón
            const randomBtn = document.getElementById('randomMessageBtn');
            randomBtn.style.transform = 'scale(0.95)';
            setTimeout(() => {
                randomBtn.style.transform = 'scale(1)';
            }, 150);
        }

        // Enviar mensaje
        function sendMessage() {
            const messageText = document.getElementById('messageText').value.trim();
            const senderName = document.getElementById('senderName').value.trim();
            
            if (!messageText) {
                showNotification('Por favor escribe un mensaje', 'error');
                return;
            }

            if (messageText.length > 300) {
                showNotification('El mensaje es demasiado largo', 'error');
                return;
            }

            if (!targetUserId) {
                showNotification('Error: Usuario no válido', 'error');
                return;
            }

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';

            // Guardar mensaje en Firestore
            db.collection('messages').add({
                userId: targetUserId,
                content: messageText,
                senderName: senderName || null, // Guardar el nombre si se proporciona
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                userAgent: navigator.userAgent,
                ip: null // Podrías agregar una función para obtener la IP si lo necesitas
            })
            .then(() => {
                showNotification('¡Mensaje enviado exitosamente!', 'success');
                
                // Limpiar formulario
                document.getElementById('messageText').value = '';
                document.getElementById('senderName').value = '';
                updateCharCount();
                
                // Restaurar botón
                sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Enviar Mensaje';
                
                // Opcional: Redirigir después de un tiempo
                setTimeout(() => {
                    // window.location.href = 'index.html';
                }, 2000);
            })
            .catch((error) => {
                console.error('Error enviando mensaje:', error);
                showNotification('Error al enviar el mensaje', 'error');
                
                // Restaurar botón
                sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Enviar Mensaje';
                sendBtn.disabled = false;
            });
        }

        // Sistema de notificaciones
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            
            notification.textContent = message;
            notification.className = 'notification ' + type;
            notification.style.display = 'block';
            
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        // Cargar información del usuario al iniciar
        loadUserInfo();

        // Permitir enviar con Ctrl+Enter
        document.addEventListener('keydown', function(event) {
            if (event.ctrlKey && event.key === 'Enter') {
                sendMessage();
            }
        });
    </script>
</body>
</html>
