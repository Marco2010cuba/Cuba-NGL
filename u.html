<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGL Cuba - Recibe mensajes anónimos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --neon-red: #ff0040;
            --neon-red-glow: #ff0040;
        }

        body {
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
        }

        .neon-border {
            border: 2px solid var(--neon-red);
            box-shadow: 0 0 10px var(--neon-red-glow);
        }

        .neon-button {
            background: linear-gradient(45deg, var(--neon-red), #ff0066);
            border: 2px solid var(--neon-red);
            box-shadow: 0 0 10px var(--neon-red-glow);
            transition: all 0.3s;
        }

        .neon-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px var(--neon-red-glow);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <!-- Profile Section -->
        <div class="text-center mb-8">
            <div class="w-24 h-24 bg-gray-700 rounded-full mx-auto mb-4 neon-border">
                <div class="w-full h-full bg-gray-600 rounded-full flex items-center justify-center">
                    <span class="text-4xl">👤</span>
                </div>
            </div>
            <h1 class="text-4xl font-bold mb-2" id="usernameDisplay" style="color: var(--neon-red); text-shadow: 0 0 10px var(--neon-red-glow);">
                Usuario
            </h1>
            <p class="text-xl text-gray-300 mb-6">Recibe mensajes anónimos</p>
        </div>

        <!-- Message Form -->
        <div class="neon-border rounded-lg p-6">
            <h2 class="text-xl font-semibold mb-4 text-center">Enviar mensaje anónimo</h2>
            <form onsubmit="sendMessage(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Tu mensaje anónimo</label>
                    <textarea id="messageText" required rows="4" class="w-full p-3 bg-gray-900 border-2 border-gray-700 rounded-lg text-white resize-none" placeholder="Escribe tu mensaje aquí..."></textarea>
                </div>
                <button type="submit" class="neon-button w-full py-3 rounded-lg text-white font-semibold text-lg">
                    📤 Enviar Mensaje
                </button>
            </form>
        </div>

        <!-- Back Button -->
        <div class="text-center mt-6">
            <button onclick="goBack()" class="text-gray-400 hover:text-gray-300 transition-colors">
                ← Volver a NGL Cuba
            </button>
        </div>

        <!-- Footer -->
        <div class="text-center mt-8 text-gray-500 text-sm">
            <p>Creado por Marco • Cuba 🇨🇺</p>
            <p>© 2024 NGL Cuba</p>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="hidden fixed inset-0 bg-black bg-opacity-95 flex items-center justify-center p-4 z-50">
        <div class="max-w-md w-full neon-border rounded-lg p-6 text-center">
            <div class="text-6xl mb-4">✅</div>
            <h2 class="text-2xl font-bold mb-4">¡Mensaje enviado!</h2>
            <p class="text-gray-300 mb-6">Tu mensaje anónimo ha sido enviado exitosamente.</p>
            <button onclick="hideSuccessModal()" class="neon-button py-3 px-6 rounded-lg text-white font-semibold">
                Cerrar
            </button>
        </div>
    </div>

    <script>
        let targetUsername = '';

        // Load username from URL
        function loadUsername() {
            const urlParams = new URLSearchParams(window.location.search);
            const username = urlParams.get('u');
            
            if (username) {
                targetUsername = username;
                document.getElementById('usernameDisplay').textContent = username;
            } else {
                // Redirect to main page if no username
                window.location.href = '/';
            }
        }

        // Send message
        function sendMessage(event) {
            event.preventDefault();
            const messageText = document.getElementById('messageText').value;

            if (!messageText.trim()) {
                alert('Escribe un mensaje');
                return;
            }

            // Get existing messages
            const messages = JSON.parse(localStorage.getItem('ngl_messages') || '[]');
            
            // Add new message
            const newMessage = {
                id: Date.now().toString(),
                recipientUsername: targetUsername,
                content: messageText,
                senderName: 'Anónimo',
                createdAt: new Date().toISOString()
            };

            messages.push(newMessage);
            localStorage.setItem('ngl_messages', JSON.stringify(messages));

            // Clear form
            document.getElementById('messageText').value = '';

            // Show success modal
            showSuccessModal();
        }

        // Show/Hide success modal
        function showSuccessModal() {
            document.getElementById('successModal').classList.remove('hidden');
        }

        function hideSuccessModal() {
            document.getElementById('successModal').classList.add('hidden');
        }

        // Go back
        function goBack() {
            window.location.href = '/';
        }

        // Initialize
        loadUsername();
    </script>
</body>
</html>
